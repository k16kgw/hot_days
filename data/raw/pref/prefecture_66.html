<script type="text/javascript">
  function viewPoint(as, bk_no, ch, ch_kn, lat_d, lat_m, lon_d, lon_m, height, f_pre, f_wsp, f_tem, f_sun, f_snc, f_hum, ed_y, ed_m, ed_d, bikou1, bikou2, bikou3, bikou4, bikou5){
    if(bk_no == 47646 || bk_no == 47690 || bk_no == 47945){
      ch = ch + "※";
      ch_kn = ch_kn + "※";
    }
    if(bk_no == 47401) {ch_kn = 'ワッカナイ';}
    if(bk_no == 47412) {ch_kn = 'サッポロ';}
    if(bk_no == 47421) {ch_kn = 'スッツ';}
    if(bk_no == 47433) {ch_kn = 'クッチャン';}
    if(bk_no == 47520) {ch_kn = 'シンジョウ';}
    if(bk_no == 47648) {ch_kn = 'チョウシ';}
    if(bk_no == 47662) {ch_kn = 'トウキョウ';}
    if(bk_no == 47678) {ch_kn = 'ハチジョウジマ';}
    if(bk_no == 47684) {ch_kn = 'ヨッカイチ';}
    if(bk_no == 47746) {ch_kn = 'トットリ';}
    if(bk_no == 47759) {ch_kn = 'キョウト';}
    if(bk_no == 47829) {ch_kn = 'ミヤコノジョウ';}
    document.all('point_ch').firstChild.nodeValue=ch;
    document.all('point_ch_kn').firstChild.nodeValue=ch_kn;
    if((lat_d-0) < 0){
      document.all('point_lat').firstChild.nodeValue='南緯'+Math.abs(lat_d-0)+'度'+lat_m+'分';
    }else{
      document.all('point_lat').firstChild.nodeValue='北緯'+lat_d+'度'+lat_m+'分';
    }
    document.all('point_lon').firstChild.nodeValue='東経'+(lon_d-0)+'度'+lon_m+'分';

    if(height == 0){
      document.all('point_height').firstChild.nodeValue='0ｍ';
    }else{
      document.all('point_height').firstChild.nodeValue=height+'m　';
    }

    if(as == 'a'){
      document.all('point_style').firstChild.nodeValue='アメダス';
    }
    if(as == 's'){
      document.all('point_style').firstChild.nodeValue='気象台、測候所など';
    }
    if(f_pre == '1' || as == 's') document.all('ob_rain').src = "../../data/image/obs/ob_rain.gif"
    if(f_wsp == '1' || as == 's') document.all('ob_wind').src = "../../data/image/obs/ob_wind.gif"
    if(f_tem == '1' || as == 's') document.all('ob_tmeter').src = "../../data/image/obs/ob_tmeter.gif"
    if(f_sun == '1' || f_sun == '2' || f_sun == '3' || as == 's') document.all('ob_sun').src = "../../data/image/obs/ob_sun.gif"
    if(f_snc == '1') document.all('ob_snow').src = "../../data/image/obs/ob_snow.gif"
    if(f_hum == '1' || as == 's') document.all('ob_hum').src = "../../data/image/obs/ob_hum.gif"
    //if(f_hum == '1' || as == 's') document.all('ob_hum').src = "../../image/obs/ob_hum.gif"
    if(ed_y != '9999'){
      document.all('point_ed_dt').firstChild.nodeValue=ed_y+'年'+ed_m+'月'+ed_d+'日まで観測';
    }
    if(bk_no == 47646 || bk_no == 47690 || bk_no == 47945){
      document.all('notation_b').firstChild.nodeValue='※地点、カナの（ ）内は気象台・測候所などの名称です。';
    }else{
      document.all('notation_b').firstChild.nodeValue='　';
    }

    if(bikou1 != ""){
      document.all('point_bikou1').firstChild.nodeValue=bikou1;
    }else{
      document.all('point_bikou1').firstChild.nodeValue='　';
    }
    if(bikou2 != ""){
      document.all('point_bikou2').firstChild.nodeValue=bikou2;
    }else{
      document.all('point_bikou2').firstChild.nodeValue='　';
    }
    if(bikou3 != ""){
      document.all('point_bikou3').firstChild.nodeValue=bikou3;
    }else{
      document.all('point_bikou3').firstChild.nodeValue='　';
    }
    if(bikou4 != ""){
      document.all('point_bikou4').firstChild.nodeValue=bikou4;
    }else{
      document.all('point_bikou4').firstChild.nodeValue='　';
    }
    if(bikou5 != ""){
      document.all('point_bikou5').firstChild.nodeValue=bikou5;
    }else{
      document.all('point_bikou5').firstChild.nodeValue='　';
    }
  }
  function initPoint(){
    document.all('point_ch').firstChild.nodeValue="　";
    document.all('point_ch_kn').firstChild.nodeValue="　";
    document.all('point_lat').firstChild.nodeValue="　";
    document.all('point_lon').firstChild.nodeValue="　";
    document.all('point_height').firstChild.nodeValue="　";
    document.all('point_style').firstChild.nodeValue="　";
    document.all('ob_rain').src = "../../data/image/obs/ob_null.gif"
    document.all('ob_wind').src = "../../data/image/obs/ob_null.gif"
    document.all('ob_tmeter').src = "../../data/image/obs/ob_null.gif"
    document.all('ob_sun').src = "../../data/image/obs/ob_null.gif"
    document.all('ob_snow').src = "../../data/image/obs/ob_null.gif"
    document.all('ob_hum').src = "../../data/image/obs/ob_null.gif"
    document.all('point_ed_dt').firstChild.nodeValue="　";
    document.all('notation_b').firstChild.nodeValue="　";
    document.all('point_bikou1').firstChild.nodeValue="　";
    document.all('point_bikou2').firstChild.nodeValue="　";
    document.all('point_bikou3').firstChild.nodeValue="　";
    document.all('point_bikou4').firstChild.nodeValue="　";
    document.all('point_bikou5').firstChild.nodeValue="　";
  }
</script>
